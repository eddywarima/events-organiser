<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Categories - Event Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #007bff, #ffffff); 
            min-height: 100vh; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .page-header {
            background: linear-gradient(135deg, rgba(0, 123, 255, 0.9), rgba(255, 191, 0, 0.1));
            color: white;
            padding: 2rem 0;
            border-radius: 0 0 30px 30px;
            margin-bottom: 2rem;
        }
        .category-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }
        .category-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .category-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
            margin-bottom: 1rem;
        }
        .category-stats {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        .stat-badge {
            background: #f8f9fa;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(45deg, #007bff, #0056b3);
            border: none;
            border-radius: 25px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.4);
        }
        .modal-content {
            border-radius: 15px;
            border: none;
        }
        .modal-header {
            background: linear-gradient(135deg, #007bff, #0056b3);
            color: white;
            border-radius: 15px 15px 0 0;
        }
        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px solid #dee2e6;
        }
        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
            gap: 0.5rem;
            max-height: 200px;
            overflow-y: auto;
            padding: 1rem;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }
        .icon-option {
            width: 40px;
            height: 40px;
            border: 2px solid transparent;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .icon-option:hover {
            border-color: #007bff;
            background: rgba(0, 123, 255, 0.1);
        }
        .icon-option.selected {
            border-color: #007bff;
            background: rgba(0, 123, 255, 0.2);
        }
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 2rem;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="admin-dashboard.html">
                <i class="fas fa-calendar-alt me-2"></i>
                EventBooking Admin
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="admin-dashboard.html">
                            <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="admin-categories.html">
                            <i class="fas fa-tags me-1"></i>Categories
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="admin-add-event.html">
                            <i class="fas fa-plus me-1"></i>Add Event
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="admin-analytics.html">
                            <i class="fas fa-chart-bar me-1"></i>Analytics
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="http://localhost/event%20booking/backend/auth/logout.php">
                            <i class="fas fa-sign-out-alt me-1"></i>Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <div class="page-header">
        <div class="container text-center">
            <h1 class="mb-2">
                <i class="fas fa-tags me-3"></i>Manage Categories
            </h1>
            <p class="lead">Organize events by categories for better navigation</p>
            <button class="btn btn-light btn-lg" data-bs-toggle="modal" data-bs-target="#categoryModal">
                <i class="fas fa-plus me-2"></i>Add New Category
            </button>
        </div>
    </div>

    <!-- Categories Grid -->
    <div class="container">
        <div class="row" id="categoriesGrid">
            <!-- Categories will be loaded here -->
        </div>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-spinner">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- Category Modal -->
    <div class="modal fade" id="categoryModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">
                        <i class="fas fa-tag me-2"></i>Add Category
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="categoryForm">
                        <input type="hidden" id="categoryId" name="id">
                        <input type="hidden" id="csrf_token" name="csrf_token">
                        <input type="hidden" id="action" name="action" value="create">
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="categoryName" class="form-label">Category Name *</label>
                                    <input type="text" class="form-control" id="categoryName" name="name" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="sortOrder" class="form-label">Sort Order</label>
                                    <input type="number" class="form-control" id="sortOrder" name="sort_order" min="0" value="0">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="categoryDescription" class="form-label">Description</label>
                            <textarea class="form-control" id="categoryDescription" name="description" rows="3"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="categoryColor" class="form-label">Color</label>
                                    <div class="d-flex gap-2">
                                        <input type="text" class="form-control" id="categoryColor" name="color" placeholder="#FF0000">
                                        <div class="color-preview" id="colorPreview"></div>
                                    </div>
                                    <small class="form-text text-muted">Use hex color code (e.g., #FF0000)</small>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Icon</label>
                                    <div class="icon-grid" id="iconGrid">
                                        <!-- Icons will be loaded here -->
                                    </div>
                                    <input type="hidden" id="selectedIcon" name="icon">
                                </div>
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="isActive" name="is_active" checked>
                                <label class="form-check-label" for="isActive">
                                    Active
                                    <small class="d-block text-muted">Inactive categories won't be shown to users</small>
                                </label>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-danger" id="deleteBtn" style="display: none;">
                        <i class="fas fa-trash me-2"></i>Delete
                    </button>
                    <button type="button" class="btn btn-primary" id="saveBtn">
                        <i class="fas fa-save me-2"></i>Save Category
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let categories = [];
        const icons = [
            'fas fa-music', 'fas fa-theater-masks', 'fas fa-running', 'fas fa-chalkboard-teacher',
            'fas fa-glass-cheers', 'fas fa-users', 'fas fa-palette', 'fas fa-laugh',
            'fas fa-child', 'fas fa-laptop-code', 'fas fa-microphone', 'fas fa-film',
            'fas fa-camera', 'fas fa-book', 'fas fa-graduation-cap', 'fas fa-briefcase',
            'fas fa-heart', 'fas fa-star', 'fas fa-globe', 'fas fa-gamepad',
            'fas fa-utensils', 'fas fa-shopping-bag', 'fas fa-plane', 'fas fa-car'
        ];

        // Load categories
        function loadCategories() {
            showLoading();
            
            fetch('http://localhost/event%20booking/backend/categories/get-categories-simple.php')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        categories = data.categories;
                        renderCategories();
                        hideLoading();
                    } else {
                        showError('Failed to load categories: ' + (data.error || 'Unknown error'));
                        hideLoading();
                    }
                })
                .catch(error => {
                    console.error('Error loading categories:', error);
                    showError('Error loading categories: ' + error.message);
                    hideLoading();
                });
        }

        // Render categories
        function renderCategories() {
            const grid = document.getElementById('categoriesGrid');
            grid.innerHTML = '';

            categories.forEach(category => {
                const col = document.createElement('div');
                col.className = 'col-md-6 col-lg-4';
                
                col.innerHTML = `
                    <div class="category-card">
                        <div class="card-body">
                            <div class="d-flex align-items-start">
                                <div class="category-icon" style="background-color: ${category.color};">
                                    <i class="${category.icon}"></i>
                                </div>
                                <div class="flex-grow-1">
                                    <h5 class="card-title">${category.name}</h5>
                                    <p class="card-text text-muted">${category.description || 'No description'}</p>
                                </div>
                            </div>
                            <div class="category-stats">
                                <span class="stat-badge">
                                    <i class="fas fa-calendar me-1"></i>
                                    Sort: ${category.sort_order}
                                </span>
                                <span class="badge bg-${category.is_active ? 'success' : 'secondary'}">
                                    ${category.is_active ? 'Active' : 'Inactive'}
                                </span>
                            </div>
                            <div class="mt-3">
                                <button class="btn btn-sm btn-outline-primary me-2" onclick="editCategory(${category.id})">
                                    <i class="fas fa-edit me-1"></i>Edit
                                </button>
                                <button class="btn btn-sm btn-outline-secondary" onclick="toggleCategoryStatus(${category.id})">
                                    <i class="fas fa-toggle-${category.is_active ? 'on' : 'off'} me-1"></i>
                                    ${category.is_active ? 'Deactivate' : 'Activate'}
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(col);
            });
        }

        // Edit category
        function editCategory(id) {
            const category = categories.find(c => c.id === id);
            if (!category) return;

            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit me-2"></i>Edit Category';
            document.getElementById('categoryId').value = category.id;
            document.getElementById('action').value = 'update';
            document.getElementById('categoryName').value = category.name;
            document.getElementById('categoryDescription').value = category.description || '';
            document.getElementById('categoryColor').value = category.color || '';
            document.getElementById('sortOrder').value = category.sort_order;
            document.getElementById('isActive').checked = category.is_active;
            document.getElementById('selectedIcon').value = category.icon || '';
            
            updateColorPreview();
            updateIconSelection();
            
            document.getElementById('deleteBtn').style.display = 'inline-block';
            
            const modal = new bootstrap.Modal(document.getElementById('categoryModal'));
            modal.show();
        }

        // Toggle category status
        function toggleCategoryStatus(id) {
            const category = categories.find(c => c.id === id);
            if (!category) return;

            const formData = new FormData();
            formData.append('action', 'update');
            formData.append('id', id);
            formData.append('name', category.name);
            formData.append('description', category.description || '');
            formData.append('icon', category.icon || '');
            formData.append('color', category.color || '');
            formData.append('sort_order', category.sort_order);
            formData.append('is_active', !category.is_active);

            fetchCSRFToken().then(csrfToken => {
                formData.append('csrf_token', csrfToken);
                
                fetch('http://localhost/event%20booking/backend/categories/manage-categories.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showSuccess(`Category ${!category.is_active ? 'activated' : 'deactivated'} successfully`);
                        loadCategories();
                    } else {
                        showError(data.message || 'Failed to update category');
                    }
                })
                .catch(error => {
                    console.error('Error updating category:', error);
                    showError('Error updating category');
                });
            });
        }

        // Initialize icon grid
        function initializeIconGrid() {
            const grid = document.getElementById('iconGrid');
            grid.innerHTML = '';
            
            icons.forEach(icon => {
                const iconDiv = document.createElement('div');
                iconDiv.className = 'icon-option';
                iconDiv.innerHTML = `<i class="${icon}"></i>`;
                iconDiv.onclick = () => selectIcon(icon, iconDiv);
                grid.appendChild(iconDiv);
            });
        }

        // Select icon
        function selectIcon(icon, element) {
            document.querySelectorAll('.icon-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById('selectedIcon').value = icon;
        }

        // Update icon selection
        function updateIconSelection() {
            const selectedIcon = document.getElementById('selectedIcon').value;
            document.querySelectorAll('.icon-option').forEach(el => {
                if (el.querySelector('i').className === selectedIcon) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        }

        // Update color preview
        function updateColorPreview() {
            const color = document.getElementById('categoryColor').value;
            document.getElementById('colorPreview').style.backgroundColor = color;
        }

        // Fetch CSRF token
        function fetchCSRFToken() {
            return fetch('http://localhost/event%20booking/backend/utils/csrf_token.php')
                .then(response => response.json())
                .then(data => data.csrf_token);
        }

        // Show loading
        function showLoading() {
            document.getElementById('loadingSpinner').style.display = 'block';
            document.getElementById('categoriesGrid').style.display = 'none';
        }

        // Hide loading
        function hideLoading() {
            document.getElementById('loadingSpinner').style.display = 'none';
            document.getElementById('categoriesGrid').style.display = 'flex';
        }

        // Show error message
        function showError(message) {
            const alert = document.createElement('div');
            alert.className = 'alert alert-danger alert-dismissible fade show position-fixed top-0 start-50 translate-middle-x mt-3';
            alert.style.zIndex = '9999';
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        // Show success message
        function showSuccess(message) {
            const alert = document.createElement('div');
            alert.className = 'alert alert-success alert-dismissible fade show position-fixed top-0 start-50 translate-middle-x mt-3';
            alert.style.zIndex = '9999';
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        // Event listeners
        document.getElementById('categoryColor').addEventListener('input', updateColorPreview);

        document.getElementById('saveBtn').addEventListener('click', function() {
            const form = document.getElementById('categoryForm');
            const formData = new FormData(form);
            
            fetchCSRFToken().then(csrfToken => {
                formData.set('csrf_token', csrfToken);
                
                fetch('http://localhost/event%20booking/backend/categories/manage-categories.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showSuccess(data.message);
                        bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide();
                        loadCategories();
                    } else {
                        showError(data.message || 'Failed to save category');
                    }
                })
                .catch(error => {
                    console.error('Error saving category:', error);
                    showError('Error saving category');
                });
            });
        });

        document.getElementById('deleteBtn').addEventListener('click', function() {
            if (!confirm('Are you sure you want to delete this category? This action cannot be undone.')) {
                return;
            }
            
            const categoryId = document.getElementById('categoryId').value;
            const formData = new FormData();
            formData.append('action', 'delete');
            formData.append('id', categoryId);
            
            fetchCSRFToken().then(csrfToken => {
                formData.set('csrf_token', csrfToken);
                
                fetch('http://localhost/event%20booking/backend/categories/manage-categories.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showSuccess(data.message);
                        bootstrap.Modal.getInstance(document.getElementById('categoryModal')).hide();
                        loadCategories();
                    } else {
                        showError(data.message || 'Failed to delete category');
                    }
                })
                .catch(error => {
                    console.error('Error deleting category:', error);
                    showError('Error deleting category');
                });
            });
        });

        // Reset modal when closed
        document.getElementById('categoryModal').addEventListener('hidden.bs.modal', function() {
            document.getElementById('categoryForm').reset();
            document.getElementById('modalTitle').innerHTML = '<i class="fas fa-tag me-2"></i>Add Category';
            document.getElementById('categoryId').value = '';
            document.getElementById('action').value = 'create';
            document.getElementById('deleteBtn').style.display = 'none';
            document.getElementById('colorPreview').style.backgroundColor = '';
            document.querySelectorAll('.icon-option').forEach(el => el.classList.remove('selected'));
        });

        // Initialize
        initializeIconGrid();
        loadCategories();
    </script>
</body>
</html>
