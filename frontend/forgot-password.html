<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Event Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #007bff, #ffffff); 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card { 
            background-color: rgba(255, 255, 255, 0.9); 
            border: 2px solid #007bff; 
            border-radius: 15px;
        }
        .btn-primary { 
            background-color: #007bff; 
            border-color: #007bff; 
        }
        .text-amber { 
            color: #FFBF00; 
            font-weight: bold;
        }
        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        .alert {
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="card-title text-center text-amber mb-4">Forgot Password</h2>
                        
                        <p class="text-center text-muted mb-4">
                            Enter your email address and we'll send you a link to reset your password.
                        </p>

                        <div id="alert-container"></div>

                        <form id="forgotPasswordForm">
                            <input type="hidden" id="csrf_token" name="csrf_token">
                            
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" class="form-control" id="email" name="email" required>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary" id="submitBtn">
                                    <span id="btnText">Send Reset Link</span>
                                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </span>
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-3">
                            <a href="login.html" class="text-decoration-none">Back to Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Fetch CSRF token
        fetch('http://localhost/event%20booking/backend/utils/csrf_token.php')
            .then(response => {
                console.log('CSRF token response status:', response.status);
                console.log('CSRF token response headers:', [...response.headers.entries()]);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const contentType = response.headers.get('content-type');
                console.log('CSRF token content type:', contentType);
                
                if (!contentType || !contentType.includes('application/json')) {
                    return response.text().then(text => {
                        console.log('CSRF token non-JSON response:', text);
                        throw new Error('Server returned non-JSON response when fetching CSRF token.');
                    });
                }
                
                // Use robust JSON parsing
                return response.text().then(text => {
                    try {
                        const cleanText = text.replace(/<[^>]*>/g, '').trim();
                        console.log('Cleaned CSRF token text:', cleanText);
                        return JSON.parse(cleanText);
                    } catch (parseError) {
                        console.error('CSRF token JSON parse error:', parseError);
                        console.error('Original CSRF token text that failed to parse:', text);
                        throw new Error('Invalid CSRF token JSON response: ' + parseError.message);
                    }
                });
            })
            .then(data => {
                console.log('CSRF token data:', data);
                if (!data.csrf_token) {
                    throw new Error('CSRF token not found in response');
                }
                document.getElementById('csrf_token').value = data.csrf_token;
            })
            .catch(error => {
                console.error('Error fetching CSRF token:', error);
                console.error('Error stack:', error.stack);
                if (error.message.includes('non-JSON response')) {
                    showAlert('error', 'Server error occurred. Please check server logs or refresh page.');
                } else {
                    showAlert('error', 'Failed to load security token: ' + error.message);
                }
            });

        // Form submission
        document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const csrfToken = document.getElementById('csrf_token').value;
            
            if (!email || !csrfToken) {
                showAlert('error', 'Please fill in all fields.');
                return;
            }

            // Show loading state
            setLoading(true);
            
            // Send request
            fetch('http://localhost/event%20booking/backend/auth/request-password-reset.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    email: email,
                    csrf_token: csrfToken
                })
            })
            .then(response => {
                console.log('Password reset response status:', response.status);
                console.log('Password reset response headers:', [...response.headers.entries()]);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const contentType = response.headers.get('content-type');
                console.log('Password reset content type:', contentType);
                
                // Clone the response to log the body before parsing
                const clonedResponse = response.clone();
                clonedResponse.text().then(text => {
                    console.log('Password reset raw response body:', text);
                });
                
                if (!contentType || !contentType.includes('application/json')) {
                    return response.text().then(text => {
                        console.log('Password reset non-JSON response:', text);
                        throw new Error('Server returned non-JSON response when requesting password reset.');
                    });
                }
                
                // Use a more robust JSON parsing method
                return response.text().then(text => {
                    try {
                        // Remove any potential HTML that might be injected by extensions
                        const cleanText = text.replace(/<[^>]*>/g, '').trim();
                        console.log('Cleaned response text:', cleanText);
                        return JSON.parse(cleanText);
                    } catch (parseError) {
                        console.error('JSON parse error:', parseError);
                        console.error('Original text that failed to parse:', text);
                        throw new Error('Invalid JSON response: ' + parseError.message);
                    }
                });
            })
            .then(data => {
                console.log('Password reset data:', data);
                if (data.success) {
                    showAlert('success', data.message);
                    // Clear form
                    document.getElementById('email').value = '';
                    // Fetch new CSRF token
                    fetch('http://localhost/event%20booking/backend/utils/csrf_token.php')
                        .then(response => {
                            if (!response.ok) {
                                throw new Error(`HTTP error! status: ${response.status}`);
                            }
                            const contentType = response.headers.get('content-type');
                            if (!contentType || !contentType.includes('application/json')) {
                                return response.text().then(text => {
                                    throw new Error('Server returned non-JSON response when refreshing CSRF token.');
                                });
                            }
                            return response.json();
                        })
                        .then(csrfData => {
                            if (!csrfData.csrf_token) {
                                throw new Error('CSRF token not found in response');
                            }
                            document.getElementById('csrf_token').value = csrfData.csrf_token;
                        })
                        .catch(error => {
                            console.error('Error refreshing CSRF token:', error);
                        });
                } else {
                    showAlert('error', data.message);
                }
            })
            .catch(error => {
                console.error('Password reset error:', error);
                console.error('Password reset error stack:', error.stack);
                console.error('Password reset error name:', error.name);
                console.error('Password reset error message:', error.message);
                
                if (error.message.includes('non-JSON response')) {
                    showAlert('error', 'Server error occurred while processing password reset. Please check server logs.');
                } else {
                    showAlert('error', 'An error occurred: ' + error.message);
                }
            })
            .finally(() => {
                setLoading(false);
            });
        });

        function showAlert(type, message) {
            const alertContainer = document.getElementById('alert-container');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
            
            const alert = document.createElement('div');
            alert.className = `alert ${alertClass} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);
            
            // Auto-dismiss after 5 seconds
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.remove();
                }
            }, 5000);
        }

        function setLoading(loading) {
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            if (loading) {
                submitBtn.disabled = true;
                btnText.textContent = 'Sending...';
                btnSpinner.classList.remove('d-none');
            } else {
                submitBtn.disabled = false;
                btnText.textContent = 'Send Reset Link';
                btnSpinner.classList.add('d-none');
            }
        }
    </script>
</body>
</html>
