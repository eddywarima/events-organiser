<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Event Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #007bff, #ffffff); 
            min-height: 100vh; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card { 
            background-color: rgba(255, 255, 255, 0.9); 
            border: 2px solid #007bff; 
            border-radius: 15px;
        }
        .btn-primary { 
            background-color: #007bff; 
            border-color: #007bff; 
        }
        .text-amber { 
            color: #FFBF00; 
            font-weight: bold;
        }
        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        .alert {
            border-radius: 10px;
        }
        .password-strength {
            height: 5px;
            border-radius: 3px;
            margin-top: 5px;
            transition: all 0.3s ease;
        }
        .password-strength-weak { background-color: #dc3545; width: 33%; }
        .password-strength-medium { background-color: #ffc107; width: 66%; }
        .password-strength-strong { background-color: #28a745; width: 100%; }
    </style>
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-4">
                        <h2 class="card-title text-center text-amber mb-4">Reset Password</h2>
                        
                        <p class="text-center text-muted mb-4">
                            Enter your new password below.
                        </p>

                        <div id="alert-container"></div>

                        <form id="resetPasswordForm">
                            <input type="hidden" id="csrf_token" name="csrf_token">
                            <input type="hidden" id="token" name="token">
                            
                            <div class="mb-3">
                                <label for="password" class="form-label">New Password</label>
                                <input type="password" class="form-control" id="password" name="password" required>
                                <div id="passwordStrength" class="password-strength"></div>
                                <small class="form-text text-muted">
                                    Password must be at least 8 characters long and contain uppercase, lowercase, and numbers.
                                </small>
                            </div>

                            <div class="mb-3">
                                <label for="confirm_password" class="form-label">Confirm Password</label>
                                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                                <div id="passwordMatch" class="form-text"></div>
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary" id="submitBtn">
                                    <span id="btnText">Reset Password</span>
                                    <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </span>
                                </button>
                            </div>
                        </form>

                        <div class="text-center mt-3">
                            <a href="login.html" class="text-decoration-none">Back to Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            showAlert('error', 'Invalid reset link. Please request a new password reset.');
            document.getElementById('resetPasswordForm').style.display = 'none';
        } else {
            document.getElementById('token').value = token;
        }

        // Fetch CSRF token
        fetch('http://localhost/event%20booking/backend/utils/csrf_token.php')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    return response.text().then(text => {
                        throw new Error('Server returned non-JSON response when fetching CSRF token.');
                    });
                }
                return response.json();
            })
            .then(data => {
                if (!data.csrf_token) {
                    throw new Error('CSRF token not found in response');
                }
                document.getElementById('csrf_token').value = data.csrf_token;
            })
            .catch(error => {
                console.error('Error fetching CSRF token:', error);
                if (error.message.includes('non-JSON response')) {
                    showAlert('error', 'Server error occurred. Please check server logs or refresh the page.');
                } else {
                    showAlert('error', 'Failed to load security token: ' + error.message);
                }
            });

        // Password strength checker
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const strength = checkPasswordStrength(password);
            updatePasswordStrength(strength);
            checkPasswordMatch();
        });

        // Password match checker
        document.getElementById('confirm_password').addEventListener('input', checkPasswordMatch);

        function checkPasswordStrength(password) {
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.match(/[a-z]/)) strength++;
            if (password.match(/[A-Z]/)) strength++;
            if (password.match(/[0-9]/)) strength++;
            if (password.match(/[^a-zA-Z0-9]/)) strength++;
            
            return strength;
        }

        function updatePasswordStrength(strength) {
            const strengthDiv = document.getElementById('passwordStrength');
            strengthDiv.className = 'password-strength';
            
            if (strength <= 2) {
                strengthDiv.classList.add('password-strength-weak');
            } else if (strength <= 4) {
                strengthDiv.classList.add('password-strength-medium');
            } else {
                strengthDiv.classList.add('password-strength-strong');
            }
        }

        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const matchDiv = document.getElementById('passwordMatch');
            
            if (confirmPassword === '') {
                matchDiv.textContent = '';
                matchDiv.className = 'form-text';
                return;
            }
            
            if (password === confirmPassword) {
                matchDiv.textContent = 'Passwords match';
                matchDiv.className = 'form-text text-success';
            } else {
                matchDiv.textContent = 'Passwords do not match';
                matchDiv.className = 'form-text text-danger';
            }
        }

        // Form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm_password').value;
            const csrfToken = document.getElementById('csrf_token').value;
            const resetToken = document.getElementById('token').value;
            
            // Validation
            if (!password || !confirmPassword || !csrfToken || !resetToken) {
                showAlert('error', 'Please fill in all fields.');
                return;
            }
            
            if (password !== confirmPassword) {
                showAlert('error', 'Passwords do not match.');
                return;
            }
            
            if (password.length < 8) {
                showAlert('error', 'Password must be at least 8 characters long.');
                return;
            }
            
            if (!password.match(/[A-Z]/) || !password.match(/[a-z]/) || !password.match(/[0-9]/)) {
                showAlert('error', 'Password must contain uppercase, lowercase, and numbers.');
                return;
            }

            // Show loading state
            setLoading(true);
            
            // Send request
            fetch('http://localhost/event%20booking/backend/auth/reset-password.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    token: resetToken,
                    password: password,
                    confirm_password: confirmPassword,
                    csrf_token: csrfToken
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    return response.text().then(text => {
                        throw new Error('Server returned non-JSON response when resetting password.');
                    });
                }
                return response.json();
            })
            .then(data => {
                if (data.success) {
                    showAlert('success', data.message);
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showAlert('error', data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                if (error.message.includes('non-JSON response')) {
                    showAlert('error', 'Server error occurred while resetting password. Please check server logs.');
                } else {
                    showAlert('error', 'An error occurred: ' + error.message);
                }
            })
            .finally(() => {
                setLoading(false);
            });
        });

        function showAlert(type, message) {
            const alertContainer = document.getElementById('alert-container');
            const alertClass = type === 'success' ? 'alert-success' : 'alert-danger';
            
            const alert = document.createElement('div');
            alert.className = `alert ${alertClass} alert-dismissible fade show`;
            alert.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            
            alertContainer.innerHTML = '';
            alertContainer.appendChild(alert);
            
            // Auto-dismiss after 5 seconds
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.remove();
                }
            }, 5000);
        }

        function setLoading(loading) {
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const btnSpinner = document.getElementById('btnSpinner');
            
            if (loading) {
                submitBtn.disabled = true;
                btnText.textContent = 'Resetting...';
                btnSpinner.classList.remove('d-none');
            } else {
                submitBtn.disabled = false;
                btnText.textContent = 'Reset Password';
                btnSpinner.classList.add('d-none');
            }
        }
    </script>
</body>
</html>
