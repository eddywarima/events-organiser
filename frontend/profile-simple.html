<!DOCTYPE html>
<html>
<head>
    <title>My Profile - Event Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .profile-header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 3rem 0;
            text-align: center;
            color: white;
            border-radius: 0 0 50px 50px;
            margin-bottom: 2rem;
        }
        
        .profile-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            background: white;
            color: #007bff;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .profile-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .card-body {
            padding: 2rem;
        }
        
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0,123,255,0.25);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #007bff, #0056b3);
            border: none;
            border-radius: 10px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,123,255,0.3);
        }
        
        .btn-secondary {
            background: #6c757d;
            border: none;
            border-radius: 10px;
            padding: 0.75rem 2rem;
            font-weight: 600;
        }
        
        .stats-card {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
            margin-bottom: 1rem;
        }
        
        .stats-number {
            font-size: 2rem;
            font-weight: bold;
            color: #007bff;
        }
        
        .alert {
            border: none;
            border-radius: 10px;
            padding: 1rem 1.5rem;
        }
        
        .nav-tabs {
            border-bottom: 2px solid #e9ecef;
        }
        
        .nav-tabs .nav-link {
            border: none;
            color: #6c757d;
            font-weight: 600;
            padding: 1rem 1.5rem;
        }
        
        .nav-tabs .nav-link.active {
            background: #007bff;
            color: white;
            border-radius: 10px 10px 0 0;
        }
        
        .tab-content {
            padding: 2rem 0;
        }
    </style>
</head>
<body>
    <!-- Profile Header -->
    <div class="profile-header">
        <div class="container text-center">
            <div class="profile-icon">
                <i class="fas fa-user"></i>
            </div>
            <h1 id="profileName" class="mb-2">Loading...</h1>
            <p id="profileEmail" class="lead">Loading...</p>
        </div>
    </div>

    <div class="container">
        <!-- Stats Section -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="stats-card">
                    <div class="stats-number" id="totalBookings">0</div>
                    <div>Total Bookings</div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="stats-card">
                    <div class="stats-number" id="totalSpent">KSh0</div>
                    <div>Total Spent</div>
                </div>
            </div>
        </div>

        <!-- Profile Content -->
        <div class="profile-card">
            <div class="card-body p-4">
                <!-- Tabs -->
                <ul class="nav nav-tabs mb-4" id="profileTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="profile-tab" data-bs-toggle="tab" data-bs-target="#profile" type="button" role="tab">
                            <i class="fas fa-user me-2"></i>Profile Information
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="bookings-tab" data-bs-toggle="tab" data-bs-target="#bookings" type="button" role="tab">
                            <i class="fas fa-ticket-alt me-2"></i>My Bookings
                        </button>
                    </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content" id="profileTabContent">
                    <!-- Profile Tab -->
                    <div class="tab-pane fade show active" id="profile" role="tabpanel">
                        <form id="profileForm">
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="full_name" class="form-label">Full Name</label>
                                        <input type="text" class="form-control" id="full_name" name="full_name" required>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-12">
                                    <div class="mb-3">
                                        <label for="email" class="form-label">Email Address</label>
                                        <input type="email" class="form-control" id="email" name="email" readonly>
                                        <small class="form-text text-muted">Email cannot be changed</small>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>Save Changes
                                </button>
                                <a href="dashboard.html" class="btn btn-secondary">
                                    <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                                </a>
                            </div>
                        </form>
                    </div>

                    <!-- Bookings Tab -->
                    <div class="tab-pane fade" id="bookings" role="tabpanel">
                        <div id="userBookings">
                            <div class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-2">Loading your bookings...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fetch CSRF token function
        function fetchCSRFToken() {
            return fetch('http://localhost/event%20booking/backend/utils/csrf_token.php')
                .then(response => response.json())
                .then(data => data.csrf_token);
        }
        
        // Show notifications
        function showSuccess(message) {
            const alert = document.createElement('div');
            alert.className = 'alert alert-success alert-dismissible fade show';
            alert.innerHTML = `
                <i class="fas fa-check-circle me-2"></i>${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.querySelector('.profile-card .card-body').insertBefore(alert, document.querySelector('.nav-tabs'));
            
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.remove();
                }
            }, 5000);
        }
        
        function showError(message) {
            const alert = document.createElement('div');
            alert.className = 'alert alert-danger alert-dismissible fade show';
            alert.innerHTML = `
                <i class="fas fa-exclamation-triangle me-2"></i>${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;
            document.querySelector('.profile-card .card-body').insertBefore(alert, document.querySelector('.nav-tabs'));
            
            setTimeout(() => {
                if (alert.parentNode) {
                    alert.remove();
                }
            }, 5000);
        }

        // Load profile data
        document.addEventListener('DOMContentLoaded', function() {
            // Load profile
            fetch('http://localhost/event%20booking/backend/users/get-profile.php')
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        const profile = data.profile;
                        
                        // Update header
                        document.getElementById('profileName').textContent = profile.full_name;
                        document.getElementById('profileEmail').textContent = profile.email;
                        
                        // Update stats
                        document.getElementById('totalBookings').textContent = profile.total_bookings || 0;
                        document.getElementById('totalSpent').textContent = 'KSh' + (profile.total_spent || 0).toFixed(2);
                        
                        // Update form fields
                        document.getElementById('full_name').value = profile.full_name;
                        document.getElementById('email').value = profile.email;
                    } else {
                        showError('Failed to load profile data');
                    }
                })
                .catch(err => {
                    console.error('Error loading profile:', err);
                    showError('Error loading profile data');
                });

            // Load bookings
            loadUserBookings();
        });

        // Profile form submission
        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {
                full_name: formData.get('full_name')
            };
            
            fetchCSRFToken().then(csrfToken => {
                data.csrf_token = csrfToken;
                
                fetch('http://localhost/event%20booking/backend/users/update-profile.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        showSuccess('Profile updated successfully!');
                        document.getElementById('profileName').textContent = data.full_name;
                    } else {
                        showError(data.message || 'Failed to update profile');
                    }
                })
                .catch(err => {
                    console.error('Error updating profile:', err);
                    showError('Error updating profile');
                });
            });
        });

        // Load user bookings
        function loadUserBookings() {
            fetch('http://localhost/event%20booking/backend/bookings/user-bookings.php')
                .then(res => res.json())
                .then(bookings => {
                    const container = document.getElementById('userBookings');
                    
                    if (bookings.length === 0) {
                        container.innerHTML = `
                            <div class="text-center text-muted">
                                <i class="fas fa-ticket-alt fa-3x mb-3"></i>
                                <p>No bookings found.</p>
                            </div>
                        `;
                        return;
                    }
                    
                    let html = '<div class="row">';
                    bookings.forEach(booking => {
                        html += `
                            <div class="col-md-6 mb-3">
                                <div class="card">
                                    <div class="card-body">
                                        <h5 class="card-title">${booking.title}</h5>
                                        <p class="card-text">
                                            <small class="text-muted">
                                                <i class="fas fa-calendar me-1"></i>${booking.event_date}<br>
                                                <i class="fas fa-ticket-alt me-1"></i>${booking.tickets} tickets<br>
                                                <i class="fas fa-money-bill me-1"></i>KSh${booking.total_amount}
                                            </small>
                                        </p>
                                        <span class="badge bg-${booking.booking_status === 'confirmed' ? 'success' : 'secondary'}">
                                            ${booking.booking_status}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    container.innerHTML = html;
                })
                .catch(err => {
                    console.error('Error loading bookings:', err);
                    document.getElementById('userBookings').innerHTML = `
                        <div class="text-center text-danger">
                            <i class="fas fa-exclamation-triangle fa-2x mb-3"></i>
                            <p>Error loading bookings.</p>
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>
