<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Viewer - Localhost Development</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #007bff, #ffffff); 
            min-height: 100vh; 
            padding: 20px;
        }
        .container { 
            max-width: 1200px; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0, 123, 255, 0.15);
        }
        .email-item { 
            border-left: 4px solid #007bff; 
            margin-bottom: 15px; 
            padding: 15px; 
            background: #f8f9fa; 
        }
        .email-meta { 
            font-size: 0.9em; 
            color: #666; 
            margin-bottom: 10px; 
        }
        .email-content { 
            background: white; 
            padding: 15px; 
            border-radius: 8px; 
            max-height: 200px; 
            overflow-y: auto; 
        }
    </style>
</head>

<body>
    <div class="container p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>📧 Email Viewer (Localhost Development)</h2>
            <button class="btn btn-danger btn-sm" onclick="clearEmails()">Clear All</button>
        </div>
        
        <div id="emailList">
            <div class="text-center p-4">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-3">Loading emails...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadEmails() {
            try {
                const response = await fetch('http://localhost/event%20booking/backend/view-emails.php?action=view');
                const data = await response.json();
                
                if (data.success) {
                    displayEmails(data.emails);
                } else {
                    throw new Error(data.message || 'Failed to load emails');
                }
            } catch (error) {
                document.getElementById('emailList').innerHTML = 
                    '<div class="alert alert-danger">Error loading emails: ' + error.message + '</div>';
            }
        }
        
        function displayEmails(emails) {
            const emailList = document.getElementById('emailList');
            
            if (emails.length === 0) {
                emailList.innerHTML = '<div class="text-center p-4 text-muted">No emails sent yet.</div>';
                return;
            }
            
            emailList.innerHTML = emails.map((email, index) => `
                <div class="email-item">
                    <div class="email-meta">
                        <strong>To:</strong> ${email.to}<br>
                        <strong>Subject:</strong> ${email.subject}<br>
                        <strong>Sent:</strong> ${email.timestamp}<br>
                        <strong>Status:</strong> <span class="badge bg-success">Sent</span>
                    </div>
                    <div class="email-content">
                        <iframe srcdoc="${email.message.replace(/"/g, '&quot;')}" style="width: 100%; height: 100%; border: none;"></iframe>
                    </div>
                </div>
            `).reverse().join('');
        }
        
        async function clearEmails() {
            if (!confirm('Are you sure you want to clear all emails?')) {
                return;
            }
            
            try {
                const response = await fetch('http://localhost/event%20booking/backend/view-emails.php?action=clear');
                const data = await response.json();
                
                if (data.success) {
                    loadEmails(); // Reload the list
                } else {
                    alert('Failed to clear emails: ' + (data.message || 'Unknown error'));
                }
            } catch (error) {
                alert('Error clearing emails: ' + error.message);
            }
        }
        
        // Load emails on page load
        document.addEventListener('DOMContentLoaded', loadEmails);
        
        // Auto-refresh every 30 seconds
        setInterval(loadEmails, 30000);
    </script>
</body>
</html>
